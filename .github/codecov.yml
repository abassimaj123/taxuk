# Codecov Configuration
# Integrates with GitHub Actions to track test coverage
#
# Dashboard: https://codecov.io/gh/abassimaj123/[repo-name]

coverage:
  # Minimum coverage threshold (block PR if below)
  precision: 2
  round: down
  range: "70...100"

status:
  project:
    default:
      # Require minimum 60% coverage
      target: 60
      # Flag as failure if coverage drops >5% from main
      threshold: 5%
  patch: false
  changes: false

# Ignore certain files
ignore:
  - "**/*.g.dart"        # Generated files
  - "**/*.freezed.dart"  # Freezed files
  - "**/*.config.dart"   # Config files
  - "test/**"            # Test files themselves

comment:
  layout: "reach,diff,flags,tree"
  behavior: "default"
  require_changes: false
