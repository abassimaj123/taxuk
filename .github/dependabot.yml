version: 2

updates:
  # === PUB DEPENDENCIES ===
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    allow:
      - dependency-type: "all"
    labels:
      - "dependencies"
      - "auto-update"
    commit-message:
      prefix: "chore:"
      prefix-development: "chore:"
      include: "scope"

  # === GITHUB ACTIONS ===
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:00"
    open-pull-requests-limit: 5
    labels:
      - "ci-cd"
      - "auto-update"
