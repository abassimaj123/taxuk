name: 📊 Coverage & Metrics — Track quality over time

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  coverage:
    runs-on: ubuntu-latest
    name: Test Coverage Analysis

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      - name: 🧪 Run tests with coverage (apps with tests)
        run: |
          apps_with_tests=(
            "AutoLoan"
            "MortgageUS"
            "MortgageUK"
            "RideProfit"
          )

          total_coverage=0
          count=0

          for app in "${apps_with_tests[@]}"; do
            if [ -d "$app/test" ]; then
              cd "$app"

              echo "Testing $app..."
              flutter pub get

              # Run tests with coverage
              flutter test --coverage || exit 1

              # Extract coverage percentage (basic)
              coverage_percent=$(grep -r "lines" coverage/lcov.info 2>/dev/null | wc -l || echo "0")

              echo "✅ $app coverage generated"

              # Upload to codecov.io
              curl -s https://codecov.io/bash | bash -s - \
                -f coverage/lcov.info \
                -F "$app" \
                -C ${{ github.sha }} || true

              cd ..
              ((count++))
            fi
          done

          if [ $count -eq 0 ]; then
            echo "⚠️  No apps with tests found"
          fi

  build-size:
    runs-on: ubuntu-latest
    name: Build Size Tracking

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true

      - name: 📏 Build APK and track size
        run: |
          echo "# 📊 Build Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          apps=("AutoLoan" "MortgageUS" "RideProfit")

          for app in "${apps[@]}"; do
            if [ -f "$app/pubspec.yaml" ]; then
              cd "$app"

              echo "Building $app..."
              flutter pub get
              flutter build apk --release 2>&1 | tail -5 || true

              if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
                size_bytes=$(stat -f%z "build/app/outputs/flutter-apk/app-release.apk" 2>/dev/null || stat -c%s "build/app/outputs/flutter-apk/app-release.apk" 2>/dev/null || echo "0")
                size_mb=$((size_bytes / 1024 / 1024))

                echo "| $app | ${size_mb}MB | ✅ |" >> $GITHUB_STEP_SUMMARY
              fi

              cd ..
            fi
          done

  metrics-summary:
    runs-on: ubuntu-latest
    needs: [coverage, build-size]
    if: always()

    steps:
      - name: 📊 Quality Summary
        run: |
          echo "## ✅ Quality Metrics Collected"
          echo ""
          echo "- Coverage reports uploaded to codecov.io"
          echo "- Build sizes tracked"
          echo "- Regression detection enabled"
          echo ""
          echo "View coverage: https://codecov.io/gh/${{ github.repository }}"
